name: audit

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 14:00 UTC. Catches upstream drift (brew taps disappearing,
    # external repos moving) before it bites a real machine.
    - cron: '0 14 * * 1'

jobs:
  apply-and-audit:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Place source at chezmoi default location
        run: |
          mkdir -p "$HOME/.local/share"
          mv src "$HOME/.local/share/chezmoi"

      - name: Provision age key
        env:
          AGE_KEY: ${{ secrets.CHEZMOI_AGE_KEY }}
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          umask 077
          printf '%s' "$AGE_KEY" > "$HOME/.config/chezmoi/age-key.txt"

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init (render config, fetch externals)
        run: |
          "$HOME/.local/bin/chezmoi" init

      - name: chezmoi apply (dotfiles only, skip run_once_*)
        # CI drives brew / packages / defaults as explicit steps so we can pass
        # `--no-cask` style filtering to brew bundle. Casks (chrome, kitty, ...)
        # are gigabytes on GitHub macOS runners and not worth installing here.
        run: |
          "$HOME/.local/bin/chezmoi" apply --exclude=scripts

      - name: Run install/macos/brew.sh
        run: bash "$HOME/.local/share/chezmoi/install/macos/brew.sh"

      - name: brew bundle (formulae only, no cask)
        # Recent brew bundle dropped --no-cask, leaving only per-name skip env
        # vars that can't blanket-exclude. Easiest workaround: grep the cask
        # lines out into a scratch Brewfile.
        run: |
          grep -v '^cask' "$HOME/.config/brew/Brewfile" > /tmp/Brewfile.nocask
          brew bundle install --no-upgrade --file=/tmp/Brewfile.nocask

      - name: Run install/macos/defaults.sh
        run: bash "$HOME/.local/share/chezmoi/install/macos/defaults.sh"

      - name: Audit post-apply state (skip casks + auth)
        # auth probes git credential helper + GitHub API, neither is set up on
        # a fresh CI runner. Casks are excluded for the same reason packages
        # are filtered above.
        run: bash "$HOME/.local/share/chezmoi/tests/audit.sh" --except casks auth
