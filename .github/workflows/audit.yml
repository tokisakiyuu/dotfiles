name: audit

on:
  workflow_dispatch:
  schedule:
    # 每周一 14:00 UTC (北京 22:00) 跑一次, 提前发现 brew tap 失效、external repo 失踪等漂移问题.
    - cron: '0 14 * * 1'

jobs:
  apply-and-audit:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Place source at chezmoi default location
        run: |
          mkdir -p "$HOME/.local/share"
          mv src "$HOME/.local/share/chezmoi"

      - name: Provision age key
        env:
          AGE_KEY: ${{ secrets.CHEZMOI_AGE_KEY }}
        run: |
          mkdir -p "$HOME/.config/chezmoi"
          umask 077
          printf '%s' "$AGE_KEY" > "$HOME/.config/chezmoi/age-key.txt"

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: chezmoi init (render config, fetch externals)
        run: |
          "$HOME/.local/bin/chezmoi" init

      - name: chezmoi apply (full, run_once_* included)
        # 不排除 scripts: brew.sh / packages.sh / defaults.sh 都跑;
        # tests/audit.sh 在下一步会按 audit.yaml 校验它们的产出.
        run: |
          "$HOME/.local/bin/chezmoi" apply

      - name: Audit post-apply state
        run: bash "$HOME/.local/share/chezmoi/tests/audit.sh"
