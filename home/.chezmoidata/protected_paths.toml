# Paths that the protect-files script will lock with `chflags uchg`.
# Each entry is a table:
#   path       (required)  file or directory; may use ~ for $HOME
#   recursive  (optional)  if true and path is a directory, lock every
#                          descendant too (chflags -R uchg). Default false.
#
# What `recursive = false` on a directory means: the directory itself can't
# have children added/removed/renamed, but each existing child stays freely
# editable. `recursive = true` walks the whole subtree and locks everything
# underneath as well.
#
# WARNING: don't list files that chezmoi manages — the next apply will
# fail when chezmoi tries to rewrite them.
#
# To unprotect:
#   1. remove the entry here
#   2. manually run `chflags nouchg <path>` (or `-R nouchg` for recursive)
# The script only adds the flag; it never removes it.

[[protected_paths]]
path = "~/.config/chezmoi/age-key.txt"

[[protected_paths]]
path = "~/.ssh"
# recursive = true  # uncomment if you also want every file under ~/.ssh locked
